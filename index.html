<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>たくしー よぼう！ / Haru's Taxi</title>
<!-- installable web app (Add to Home Screen on iPad/iPhone → fullscreen) -->
<meta name="theme-color" content="#ffc531">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="たくしー">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app">
    <button class="mutebtn" id="muteBtn" aria-label="おと on/off" onclick="toggleMute(this)">🔊</button>
    <div id="view"></div>
  </div>

  <!-- load order matters: data -> sound -> art -> screens -> app -->
  <script src="js/data.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/art.js"></script>
  <script src="js/screens.js"></script>
  <script src="js/app.js"></script>

  <!-- offline support: register the service worker (http/https only) -->
  <script>
    if('serviceWorker' in navigator && location.protocol.indexOf('http')===0){
      window.addEventListener('load', function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); });
    }
  </script>
</body>
</html>
